name: PD2 Corrupted Zone Alert

on:
  schedule:
    - cron: '0,15,30,45 * * * *'
  workflow_dispatch: # Allow manual trigger and external cron services

jobs:
  check-and-alert:
    runs-on: ubuntu-latest

    steps:
      - name: Debounce — skip if already ran this 4-min window
        id: debounce
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Determine the start of the current 4-min window
          # Windows: :00-:03, :04-:07, :08-:11, ... :56-:59
          MIN=$(date -u +%-M)
          WINDOW_START=$(( (MIN / 4) * 4 ))
          WINDOW_TS="$(date -u +%Y-%m-%dT%H):$(printf '%02d' $WINDOW_START):00Z"
          WINDOW_EPOCH=$(date -u -d "$WINDOW_TS" +%s)

          echo "Current 4-min window starts at: $WINDOW_TS (epoch: $WINDOW_EPOCH)"

          # Get recent successful runs and check if any started in this window
          COUNT=$(gh run list \
            --repo "$GITHUB_REPOSITORY" \
            --workflow "pd2-cz-alert.yml" \
            --status success \
            --limit 5 \
            --json createdAt \
            -q "[.[] | select(.createdAt >= \"$WINDOW_TS\")] | length")

          echo "Successful runs in this window: $COUNT"

          if [ "$COUNT" -gt 0 ]; then
            echo "Already ran successfully in this window — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "No successful run in this window — proceeding."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        if: steps.debounce.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.debounce.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        if: steps.debounce.outputs.skip != 'true'
        run: pip install requests

      - name: Restore message ID cache
        if: steps.debounce.outputs.skip != 'true'
        uses: actions/cache/restore@v4
        with:
          path: message_ids.json
          key: discord-message-ids-${{ github.run_id }}
          restore-keys: |
            discord-message-ids-

      - name: Check Corrupted Zone and send alert
        if: steps.debounce.outputs.skip != 'true'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python scripts/send_discord_alert.py

      - name: Save message ID cache
        if: steps.debounce.outputs.skip != 'true'
        uses: actions/cache/save@v4
        with:
          path: message_ids.json
          key: discord-message-ids-${{ github.run_id }}
